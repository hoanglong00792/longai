# longai config — copy to ~/.longai/config.toml and edit

# Whitelist of Telegram chat_ids allowed to talk to the bot (I6: ≤10)
allowed_chat_ids = []

# Whitelist of chat_ids the agent's `telegram_out` tool can DM (I8)
# Default: empty list = agent can only reply to the originating chat
allowed_outbound_chat_ids = []

# Free-models-first chain (I2).
#
# 10 free tool-capable OpenRouter models in fallback order. When one hits
# cooldown (rate-limit / 5xx / timeout), the chain rotates to the next.
# Only after ALL free models are bench-pressed does it fall to paid Gemma-4.
#
# Refresh this list: `bash scripts/refresh_models.sh` queries OpenRouter for
# the current free tool-capable models and rewrites this section.
models = [
    "google/gemma-4-26b-a4b-it:free",
    "google/gemma-4-31b-it:free",
    "minimax/minimax-m2.5:free",
    "tencent/hy3-preview:free",
    "nvidia/nemotron-3-super-120b-a12b:free",
    "inclusionai/ling-2.6-flash:free",
    "inclusionai/ling-2.6-1t:free",
    "openrouter/free",
    "meta-llama/llama-3.3-70b-instruct:free",
    "nvidia/nemotron-3-nano-30b-a3b:free",
    "nvidia/nemotron-nano-12b-v2-vl:free",
    "nvidia/nemotron-nano-9b-v2:free",
    "openai/gpt-oss-120b:free",
    "openai/gpt-oss-20b:free",
    "qwen/qwen3-coder:free",
    "qwen/qwen3-next-80b-a3b-instruct:free",
    "z-ai/glm-4.5-air:free",
    # PAID FLOOR — only used when EVERY free model above is on cooldown
    "google/gemma-4-26b-a4b-it",
]

# Auto-refresh of free model list against OpenRouter API.
#
# At every CLI/bot startup, the model chain is resolved in this order:
#   1. ~/.longai/models_cache.json (if fresh per `policy` below)
#   2. live refresh from OpenRouter
#   3. stale cache (if live refresh fails — e.g., offline)
#   4. the static `models = [...]` block above
#   5. minimal hardcoded fallback chain (Gemma:free → paid Gemma)
#
# So the bot still starts even with no network. Manual refresh:
#   `bash scripts/refresh_models.sh --user-config`
[models_refresh]
policy = "weekly"  # "startup" | "daily" | "weekly" | "monthly" | "manual" | "never"
cache_path = "~/.longai/models_cache.json"

# Budget caps (I4) — these are NON-NEGOTIABLE per-call defaults
[caps]
global_daily_usd = 1.00
per_user_daily_usd = 0.25
per_call_max_usd = 0.025
per_call_wall_clock_s = 30
per_call_max_turns = 5

[paths]
db_path = "~/.longai/state.db"
mcp_config_path = "~/.longai/mcp.json"

[skills]
# Locations of external skill repos (I12, read-only). Three scopes — set the
# paths to wherever you keep skill markdown files, or leave empty/absent to
# disable a scope. The script `init_mcp.sh` also honours the env vars
# LONGAI_SKILLS_{SHARED,PERSONAL,WORK} which take priority over these entries.
shared = ""
personal = ""
work = ""

[logging]
level = "INFO"

# ── Tiered model routing (OPTIONAL — opt in by replacing `models = [...]` above) ──
#
# When the agent loop classifies a request as S/M/L (or you prefix the message
# with /quick or /deep), BudgetGuard.chat(tier=...) iterates the matching
# tier's chain, then [models.fallback].chain. Free models stay free regardless
# of tier — tier only changes which models are reachable and how many turns
# the loop can take.
#
# To enable: delete or comment out the `models = [...]` block above and
# uncomment the four tables below.
#
# [models.tier_S]   # tiny / chat / single-tool — small fast free models
# chain = [
#     "nvidia/nemotron-nano-9b-v2:free",
#     "qwen/qwen3-coder:free",
# ]
#
# [models.tier_M]   # default — 26-70B free models
# chain = [
#     "google/gemma-4-26b-a4b-it:free",
#     "google/gemma-4-31b-it:free",
#     "meta-llama/llama-3.3-70b-instruct:free",
# ]
#
# [models.tier_L]   # multi-tool research — 120B+ free models
# chain = [
#     "nvidia/nemotron-3-super-120b-a12b:free",
#     "openai/gpt-oss-120b:free",
#     "inclusionai/ling-2.6-1t:free",
# ]
#
# [models.fallback]   # paid floor — only hit when every tier chain is cooled
# chain = ["google/gemma-4-26b-a4b-it"]
#
# Per-tier cap overrides — optional. Missing keys fall through to the base
# [caps] values above. The dollar caps (global, per-user, per-call) are
# tier-agnostic by design — only turns and wall-clock vary.
#
# [caps.tier_S]
# per_call_max_turns = 3
# per_call_wall_clock_s = 15
#
# [caps.tier_L]
# per_call_max_turns = 12
# per_call_wall_clock_s = 90
